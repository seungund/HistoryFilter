<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; width: 300px; padding: 15px; margin: 0; }
    
    /* 상단 헤더 및 스위치 정렬 */
    .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    h3 { margin: 0; font-size: 16px; color: #333; }
    
    /* 토글 스위치 CSS */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #4CAF50; }
    input:checked + .slider:before { transform: translateX(20px); }

    .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
    input[type="text"] { flex-grow: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; }
    #addBtn { background-color: #4CAF50; color: white; }
    #addBtn:hover { background-color: #45a049; }
    ul { list-style-type: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; color: #555; }
    .delete-btn { background-color: #ff4d4d; color: white; padding: 4px 8px; font-size: 12px; }
    .delete-btn:hover { background-color: #e60000; }
  </style>
</head>
<body>
  <div class="header-container">
    <h3>현재 상태</h3>
    <label class="switch">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="input-group">
    <input type="text" id="domainInput" placeholder="예: example.com">
    <button id="addBtn">추가</button>
  </div>
  <ul id="domainList"></ul>
  
  <script src="popup.js"></script>
</body>
</html>
